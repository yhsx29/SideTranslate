<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="380" viewBox="0 0 1200 380" role="img" aria-labelledby="title desc">
  <title id="title">旁译 Side Translate</title>
  <desc id="desc">Windows desktop translator that turns selected text or screenshots into a nearby translation popup.</desc>

  <rect width="1200" height="380" rx="30" fill="#F4FBFA"/>
  <rect x="24" y="24" width="1152" height="332" rx="24" fill="#FFFFFF" stroke="#CFE8E4" stroke-width="2"/>

  <g id="title-block" transform="translate(64 58)">
    <rect width="326" height="34" rx="17" fill="#E5F7F3"/>
    <circle cx="18" cy="17" r="5" fill="#0F766E"/>
    <text x="32" y="23" fill="#0F766E" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="16" font-weight="700">WINDOWS · BAIDU TRANSLATE</text>

    <text x="0" y="112" fill="#183B3A" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif" font-size="72" font-weight="800">旁译</text>
    <text x="0" y="150" fill="#4F7DF3" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="27" font-weight="700">Side Translate</text>
    <text x="0" y="194" fill="#4F6668" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif" font-size="24">选中即译 · 截图即译 · 结果就在鼠标旁</text>
    <text x="0" y="225" fill="#64748B" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18">Translate without leaving your current window.</text>

    <g transform="translate(0 258)" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="16">
      <rect width="126" height="40" rx="13" fill="#EDF2FF"/>
      <text x="63" y="26" text-anchor="middle" fill="#365FC7">Ctrl+Alt+T</text>
      <rect x="138" width="126" height="40" rx="13" fill="#FFF0E9"/>
      <text x="201" y="26" text-anchor="middle" fill="#C84A08">Ctrl+Alt+S</text>
      <rect x="276" width="126" height="40" rx="13" fill="#FFF8D8"/>
      <text x="339" y="26" text-anchor="middle" fill="#7A5A00">Ctrl+Alt+A</text>
    </g>
  </g>

  <g id="selection-proof" transform="translate(610 82)">
    <text x="0" y="-14" fill="#64748B" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="15">01 / SELECT</text>
    <rect width="218" height="110" rx="18" fill="#F7FBFD" stroke="#4F7DF3" stroke-width="2" stroke-dasharray="8 7"/>
    <rect x="-5" y="-5" width="11" height="11" rx="3" fill="#4F7DF3"/>
    <rect x="212" y="104" width="11" height="11" rx="3" fill="#4F7DF3"/>
    <text x="24" y="49" fill="#183B3A" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="700">Keep your flow.</text>
    <rect x="22" y="62" width="160" height="12" rx="6" fill="#DCE6FF"/>
    <rect x="22" y="82" width="112" height="9" rx="5" fill="#E5F7F3"/>

    <path d="M226 55 C258 55 264 78 291 78" fill="none" stroke="#0F766E" stroke-width="3" stroke-linecap="round"/>
    <path d="M282 69 L292 78 L282 87" fill="none" stroke="#0F766E" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="242" y="42" fill="#0F766E" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="14">COPY</text>
  </g>

  <g id="translation-popup" transform="translate(882 48)">
    <rect width="268" height="270" rx="22" fill="#FFFFFF" stroke="#CFE8E4" stroke-width="2"/>
    <rect x="18" y="18" width="38" height="38" rx="12" fill="#EDF2FF"/>
    <text x="37" y="44" text-anchor="middle" fill="#4F7DF3" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="19" font-weight="800">译</text>
    <text x="68" y="42" fill="#183B3A" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif" font-size="19" font-weight="700">旁译</text>
    <rect x="190" y="22" width="60" height="28" rx="14" fill="#E6F7EF"/>
    <circle cx="205" cy="36" r="4" fill="#147D5B"/>
    <text x="216" y="41" fill="#147D5B" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="13">完成</text>

    <rect x="18" y="70" width="142" height="28" rx="14" fill="#E5F7F3"/>
    <text x="89" y="89" text-anchor="middle" fill="#0F766E" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="14">自动检测 → 中文</text>

    <text x="18" y="126" fill="#64748B" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="13">SOURCE</text>
    <rect x="18" y="138" width="232" height="48" rx="13" fill="#F7FBFD" stroke="#CFE8E4"/>
    <text x="34" y="168" fill="#4F6668" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17">Keep your flow.</text>

    <text x="18" y="215" fill="#64748B" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="13">TRANSLATION</text>
    <text x="18" y="246" fill="#183B3A" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif" font-size="22" font-weight="700">保持专注。</text>
  </g>

  <text x="1136" y="338" text-anchor="end" fill="#64748B" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="14">TEXT · OCR · GLOBAL HOTKEYS</text>
</svg>
